name: Obfuscate Agent

on:
  push:
    paths:
      - py/agent.py
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Obfuscate py/agent.py
        run: python tools/obfuscator.py

      - name: Commit generated py/agent_obs.py if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add py/agent_obs.py
          if git diff --cached --quiet; then
            echo "No obfuscated changes to commit."
          else
            git commit -m "Auto-update py/agent_obs.py from py/agent.py"
            git push
          fi
