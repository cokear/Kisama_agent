name: Obfuscate Agent

on:
  push:
    paths:
      - py/agent.py
      - js/agent.js
      
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Obfuscate py/agent.py
        run: python tools/obfuscator.py

      - name: Obfuscate js/agent.js
        run: 
          npx javascript-obfuscator js/agent.js \
          --output js/agent_obs.js \
          --compact true \
          --identifier-names-generator mangled \
          --string-array true \
          --string-array-encoding base64 \
          --control-flow-flattening true \
          --dead-code-injection true \
          --reserved-strings "ECDSA公钥内容,ECIES公钥内容"

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add py/agent_obs.py js/agent_obs.js
          if git diff --cached --quiet; then
            echo "No obfuscated changes to commit."
          else
            git commit -m "Auto-update obfuscated files"
            git push
          fi
