version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - LOG_LEVEL=2
      - EXEC_TIMEOUT=30
      - EXEC_SHELL=true
      - FILE_ROOT=/app/files
      - AGENT_VERSION=0.1.2-go
    volumes:
      - ./keys:/app/keys:ro
      - ./files:/app/files
    networks:
      - kisama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  kisama:
    driver: bridge
